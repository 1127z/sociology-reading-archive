name: Daily sociology reading

on:
  push:
    branches: [main]
    paths:
      - "scripts/daily_update.py"
      - "tests/test_daily_update.py"
  schedule:
    # GitHub cron uses UTC. 23:00 UTC is 07:00 Asia/Taipei the next day.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-sociology-reading
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Retrieve and generate one reading
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/daily_update.py
      - name: Validate generated content
        run: |
          python -m json.tool data/articles.generated.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          rows = json.loads(Path("data/articles.generated.json").read_text())
          required = {"slug", "title", "question", "selectionSource", "articleStructure", "theory", "methods", "chain", "findings", "highlights", "limits", "questions", "sourceUrl", "documentUrl"}
          for row in rows:
              missing = required - row.keys()
              assert not missing, f"Missing fields for {row.get('slug')}: {sorted(missing)}"
              assert (Path("public") / row["documentUrl"].removeprefix("/")).is_file()
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Verify website build
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build
      - name: Commit new reading
        run: |
          if [ -z "$(git status --porcelain -- data/articles.generated.json public/documents/)" ]; then
            echo "No new article to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.generated.json public/documents/
          git commit -m "content: add daily sociology reading"
          git push


