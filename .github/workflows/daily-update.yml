name: Daily sociology reading

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "db/**"
      - "examples/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/daily_update.py"
      - "tests/**"
  schedule:
    # GitHub cron uses UTC. 23:00 UTC is 07:00 Asia/Taipei the next day.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-sociology-reading
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Check retrieval on code changes
        if: github.event_name == 'push'
        run: python scripts/daily_update.py --dry-run
      - name: Retrieve and generate one reading
        if: github.event_name != 'push'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/daily_update.py
      - name: Validate generated content
        run: |
          python -m json.tool data/articles.generated.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          rows = json.loads(Path("data/articles.generated.json").read_text())
          required = {"slug", "title", "question", "selectionSource", "articleStructure", "theory", "methods", "chain", "findings", "highlights", "limits", "questions", "sourceUrl", "documentUrl"}
          for row in rows:
              missing = required - row.keys()
              assert not missing, f"Missing fields for {row.get('slug')}: {sorted(missing)}"
              assert (Path("public") / row["documentUrl"].removeprefix("/")).is_file()
          if rows and "evidenceBasis" in rows[0]:
              expert = {"analysisDepth", "fullTextSource", "confidence", "fieldPosition", "literatureDialogue", "contentFeatures", "researchFeatures", "criticalReview", "researchImplications", "evidenceBoundaries"}
              assert not (expert - rows[0].keys()), f"Missing expert fields: {sorted(expert - rows[0].keys())}"
              assert rows[0]["evidenceBasis"] != "摘要" or rows[0]["analysisDepth"] == "摘要解读"
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Verify website build
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm run typecheck
          npm test
          npm run build
      - name: Commit new reading
        run: |
          if [ -z "$(git status --porcelain -- data/articles.generated.json public/documents/)" ]; then
            echo "No new article to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json data/articles.generated.json public/documents/
          git commit -m "content: add daily sociology reading"
          git push



